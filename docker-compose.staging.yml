volumes:
  staging_postgres_data: {}
  staging_postgres_data_backups: {}
  staging_traefik: {}
  


services:
  django:
    build:
      context: .
      dockerfile: ./compose/staging/django/Dockerfile

    image: swivl_staging_django
    depends_on:
      - postgres
      - redis
    env_file:
      - /home/deploy/app/backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
    command: /start

  celery:
    build:
      context: .
      dockerfile: ./compose/staging/django/Dockerfile
    image: swivl_staging_celery
    depends_on:
      - postgres
      - redis
    env_file:
      - /home/deploy/app/backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.staging
    # Celery worker for async tasks (e.g. SEO enrichment)
    command: celery -A config worker -l info

  postgres:
    build:
      context: .
      dockerfile: ./compose/staging/postgres/Dockerfile
    image: swivl_staging_postgres
    volumes:
      - staging_postgres_data:/var/lib/postgresql/18/docker
      - staging_postgres_data_backups:/backups
    env_file:
      - /home/deploy/app/backend/.env

  traefik:
    build:
      context: .
      dockerfile: ./compose/staging/traefik/Dockerfile
    image: swivl_staging_traefik
    depends_on:
      - django
    volumes:
      - staging_traefik:/etc/traefik/acme
    ports:
      - '0.0.0.0:80:80'
      - '0.0.0.0:443:443'

  redis:
    image: docker.io/redis:7.2
    